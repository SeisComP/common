# FilterPicker Configuration Example
# Add these parameters to your scautopick profile file
# (e.g., ~/.seiscomp/etc/key/scautopick/profile_vquiet or station-specific files)

# =============================================================================
# FilterPicker Parameters
# =============================================================================

# Number of frequency bands for the filter bank (default: 5)
# More bands = better frequency coverage but more computation
picker.FilterPicker.numBands = 5

# Frequency range for the filter bank (default: 0.5-20 Hz)
# Adjust based on your station characteristics and target events
picker.FilterPicker.minFreq = 0.5
picker.FilterPicker.maxFreq = 20.0

# Integration window size in seconds (default: 2)
# Larger windows = more stable but slower response
picker.FilterPicker.windowSize = 2

# Detection threshold - CF ratio required to trigger (default: 2.0)
# Lower = more sensitive, more false picks
# Higher = fewer picks, might miss weak events
picker.FilterPicker.threshold = 2.0

# Threshold for turning off detection (default: 1.5)
picker.FilterPicker.thresholdOff = 1.5

# Enable adaptive thresholding (default: true)
# Adapts threshold based on noise level
picker.FilterPicker.adaptiveThreshold = true

# Minimum SNR required to accept a pick (default: 2.0)
# Lower = more picks accepted, including noisy ones
# Higher = only high-quality picks accepted
picker.FilterPicker.minSNR = 2.0

# Noise window start relative to trigger (default: -10 s)
picker.FilterPicker.noiseBegin = -10.0

# Signal window start relative to trigger (default: -5 s)
picker.FilterPicker.signalBegin = -5.0

# Signal window end relative to trigger (default: 20 s)
picker.FilterPicker.signalEnd = 20.0

