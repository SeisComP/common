# FilterPicker Configuration for SeisComP scautopick
# Based on Lomax et al. (2012): FilterPicker - a robust, broadband picker
# for real-time seismic monitoring and earthquake early-warning.
#
# Reference:
# Lomax, A., Satriano, C., & Vassallo, M. (2012).
# Automatic picker developments and optimization: FilterPicker - a robust,
# broadband picker for real-time seismic monitoring and earthquake early-warning.
# Seismological Research Letters, 83(3), 531-540.
# https://doi.org/10.1785/gssrl.83.3.531

# =============================================================================
# Basic Configuration
# =============================================================================

# Enable FilterPicker for P-phase picking
# Set this to 'FilterPicker' to use the FilterPicker algorithm
picker = FilterPicker

# Detector filter chain (used for initial trigger detection)
# The FilterPicker will refine picks after the detector triggers
filter = "RMHP(10)>>ITAPER(30)>>BW(4,0.7,2)>>STALTA(2,80)"

# =============================================================================
# FilterPicker P-phase Parameters
# =============================================================================

# Number of frequency bands for the filter bank
# More bands provide better frequency coverage but increase computation time
# Recommended: 4-8 bands for most applications
picker.FilterPicker.numBands = 5

# Minimum frequency of the filter bank (Hz)
# Lower frequencies help detect distant events
picker.FilterPicker.minFreq = 0.5

# Maximum frequency of the filter bank (Hz)
# Higher frequencies improve local event detection
picker.FilterPicker.maxFreq = 20.0

# Integration window size (seconds)
# Time window for characteristic function integration
picker.FilterPicker.windowSize = 2

# Detection threshold
# Higher values reduce false picks but may miss weaker events
picker.FilterPicker.threshold = 3.0

# Threshold for resetting detector after a pick
# Should be lower than the detection threshold
picker.FilterPicker.thresholdOff = 1.5

# Enable adaptive thresholding based on noise level
# When true, threshold is scaled by background noise
picker.FilterPicker.adaptiveThreshold = false

# =============================================================================
# Time Window Parameters
# =============================================================================

# Start of noise window relative to trigger (seconds)
# Used for SNR calculation and adaptive thresholding
picker.FilterPicker.noiseBegin = -10.0

# Start of signal window relative to trigger (seconds)
picker.FilterPicker.signalBegin = -5.0

# End of signal window relative to trigger (seconds)
picker.FilterPicker.signalEnd = 20.0

# Minimum SNR required for a valid pick
picker.FilterPicker.minSNR = 3.0

# =============================================================================
# scautopick Global Settings
# =============================================================================

# Time correction applied to picks (seconds)
timeCorrection = -0.8

# Record ringbuffer size (seconds)
ringBufferSize = 300

# Lead time to start picking before current time (seconds)
leadTime = 60

# Initialization time (blind period after startup)
initTime = 60

# Gap interpolation
gapInterpolation = false

# Thresholds
thresholds.triggerOn = 3
thresholds.triggerOff = 1.5
thresholds.maxGapLength = 4.5
thresholds.amplMaxTimeWindow = 10
thresholds.deadTime = 30
thresholds.minAmplOffset = 3

# Amplitudes to compute
amplitudes = MLv, mb, mB

# Use all streams for picking
useAllStreams = false

# Kill pending S-pickers when new detection found
killPendingSPickers = true

# Send detections as picks (debug mode)
sendDetections = false
